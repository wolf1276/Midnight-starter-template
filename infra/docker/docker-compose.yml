# Standalone local dev stack: Midnight node + indexer + proof server (+ web frontend).
#
#   npm run docker:start      # node, indexer, proof-server
#   npm run docker:stop
#   npm run docker:reset      # also drops volumes
#
# This is separate from the ephemeral testcontainers-managed environment that
# `npm run contracts:deploy` spins up per-run (see cli/proof-server.yml) —
# this one exposes fixed host ports so you can point tools/wallets at it directly.
# Image versions are pinned from infra/config/versions.json (source of truth) —
# `npm run doctor` warns if these fall out of sync with that file.
#
# No `container_name:` here on purpose — every scaffolded project runs `docker compose` with
# `-p <project-name>` (derived from its own package.json `name`, see infra/scripts/lib/ports.mjs),
# so Compose scopes container/network/volume names to that project automatically. This is what
# lets multiple scaffolded Midnight projects coexist on one machine without name collisions.
services:
  node:
    image: 'midnightntwrk/midnight-node:0.22.3'
    ports:
      - '9944:9944'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9944/health']
      interval: 2s
      timeout: 5s
      retries: 5
      start_period: 40s
    environment:
      CFG_PRESET: 'dev'
      SIDECHAIN_BLOCK_BENEFICIARY: '04bcf7ad3be7a5c790460be82a713af570f22e0f801f6659ab8e84a52be6969e'
    volumes:
      - node-data:/data

  indexer:
    image: 'midnightntwrk/indexer-standalone:4.0.1'
    ports:
      - '8088:8088'
    environment:
      RUST_LOG: 'indexer=info,chain_indexer=info,indexer_api=info,wallet_indexer=info,indexer_common=info,fastrace_opentelemetry=info,info'
      # Generated by setup.sh into infra/docker/.env (gitignored) on first run — dev-only, never
      # committed. infra/docker/.env.example documents the shape for anyone bypassing setup.sh.
      APP__INFRA__SECRET: '${INDEXER_SECRET:?Run ./setup.sh, or set INDEXER_SECRET in infra/docker/.env}'
      APP__INFRA__NODE__URL: 'ws://node:9944'
    depends_on:
      node:
        condition: service_healthy
    volumes:
      - indexer-data:/data

  proof-server:
    image: midnightntwrk/proof-server:8.0.3
    command: ['midnight-proof-server', '-v']
    ports:
      - '6300:6300'

  web:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: dev
    profiles: ['web']
    ports:
      - '3000:3000'
    env_file:
      - ../../web/.env.local
    volumes:
      - ../../web:/repo/web
      - /repo/web/node_modules
      - /repo/node_modules
    depends_on:
      - node
      - indexer
      - proof-server

volumes:
  node-data:
  indexer-data:
