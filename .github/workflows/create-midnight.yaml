name: create-midnight

on:
  push:
    paths:
      - "create-midnight/**"
      - ".github/workflows/create-midnight.yaml"
  pull_request:
    branches: [main]
    paths:
      - "create-midnight/**"
      - ".github/workflows/create-midnight.yaml"
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: create-midnight

jobs:
  verify:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  #v6.4.0
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run unit + local-fixture integration tests
        run: npm run test

      - name: Scaffold a project against the real GitHub template
        env:
          CREATE_MIDNIGHT_TEST_NETWORK: "1"
        run: npm run test

      - name: Scaffold a project via the built CLI (smoke test)
        shell: bash
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          cd "$tmp_dir"
          # --ref main: the upstream template repo has no version tags yet, so the
          # default version-locked ref (v${package.json version}) doesn't resolve.
          # Once a matching tag exists, drop --ref here to smoke-test the real
          # default path (see the README's "Note for maintainers").
          node "${{ github.workspace }}/create-midnight/dist/cli.js" smoke-app --yes --no-install --no-setup --no-git --ref main --verbose
          test -f smoke-app/package.json
          test -f smoke-app/README.md
          test -f smoke-app/web/.env.local

      - name: Validate npm package contents
        if: matrix.os == 'ubuntu-latest'
        run: |
          npm pack --dry-run
          npm pack
          tar -tzf create-midnight-*.tgz

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  #v4.6.2
        with:
          name: create-midnight-logs-${{ matrix.os }}
          path: |
            create-midnight/logs/**
            create-midnight/*.tgz
          if-no-files-found: ignore
